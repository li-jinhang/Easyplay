<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线中国象棋</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>在线中国象棋</h1>
      <p id="authTip">请先在首页登录，再进入房间对战。</p>
      <div class="form-block">
        <label for="sideSelect">创建房间执子</label>
        <select id="sideSelect">
          <option value="red">红方</option>
          <option value="black">黑方</option>
        </select>
        <button id="createRoomBtn" type="button">创建房间</button>
      </div>
      <div class="form-block">
        <label for="roomCodeInput">加入房间</label>
        <input id="roomCodeInput" type="text" maxlength="8" placeholder="输入6-8位房间号" />
        <button id="joinRoomBtn" type="button">加入房间</button>
      </div>
      <div class="room-meta">
        <p>房间号：<strong id="roomCodeValue">-</strong></p>
        <p>状态：<strong id="roomStatusValue">-</strong></p>
        <p>当前回合：<strong id="turnValue">-</strong></p>
        <p>倒计时：<strong id="countdownValue">-</strong></p>
      </div>
      <div class="chat">
        <h2>聊天</h2>
        <div id="chatList" class="chat-list"></div>
        <div class="chat-input-wrap">
          <input id="chatInput" type="text" maxlength="300" placeholder="输入聊天内容" />
          <button id="sendChatBtn" type="button">发送</button>
        </div>
      </div>
      <div id="messageBox" class="message"></div>
    </aside>
    <main class="board-wrap">
      <div id="board" class="board" aria-label="象棋棋盘"></div>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
