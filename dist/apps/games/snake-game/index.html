<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    :root {
      --bg: #10141f;
      --card: #1b2233;
      --grid: #2a334d;
      --snake: #58d68d;
      --snake-head: #27ae60;
      --food: #ff6b6b;
      --accent: #69a7ff;
      --text: #ecf0f1;
      --muted: #9fb2c7;
      --danger: #ff7675;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #182038 0%, var(--bg) 50%);
      color: var(--text);
      padding: 16px;
    }

    .app {
      width: min(92vw, 720px);
      background: rgba(27, 34, 51, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      padding: clamp(12px, 2vw, 20px);
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
      color: var(--muted);
    }

    .pill strong {
      color: var(--text);
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      color: white;
      cursor: pointer;
      background: #34495e;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(0);
    }

    .start-btn {
      background: var(--accent);
    }

    .pause-btn {
      background: #f39c12;
    }

    .restart-btn {
      background: var(--danger);
    }

    .board-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(8, 12, 20, 0.58);
      backdrop-filter: blur(2px);
      text-align: center;
      padding: 16px;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      max-width: 90%;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: clamp(20px, 3vw, 30px);
    }

    .overlay p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: clamp(14px, 2vw, 16px);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .hint kbd {
      font-family: Consolas, monospace;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-bottom-width: 2px;
      border-radius: 6px;
      padding: 1px 6px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="stats">
        <div class="pill">状态：<strong id="stateLabel">未开始</strong></div>
        <div class="pill">得分：<strong id="scoreLabel">0</strong></div>
        <div class="pill">最高分：<strong id="bestLabel">0</strong></div>
      </div>
      <div class="controls">
        <button id="startBtn" class="start-btn" type="button">开始</button>
        <button id="pauseBtn" class="pause-btn" type="button">暂停</button>
        <button id="restartBtn" class="restart-btn" type="button">重开</button>
      </div>
    </div>

    <section class="board-wrap">
      <canvas id="gameCanvas" aria-label="贪吃蛇游戏区域"></canvas>
      <div id="overlay" class="overlay">
        <div class="overlay-box">
          <h2 id="overlayTitle">贪吃蛇</h2>
          <p id="overlayText">按“开始”按钮，或按空格键开始游戏。</p>
        </div>
      </div>
    </section>

    <p class="hint">
      方向：<kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>，
      暂停/继续：<kbd>空格</kbd>，重开：<kbd>Enter</kbd>
    </p>
  </main>

  <script>
    (function () {
      "use strict";

      var GRID_SIZE = 20;
      var BASE_SPEED = 7;
      var SPEED_GROWTH = 0.2;

      var canvas = document.getElementById("gameCanvas");
      var ctx = canvas.getContext("2d");
      var overlay = document.getElementById("overlay");
      var overlayTitle = document.getElementById("overlayTitle");
      var overlayText = document.getElementById("overlayText");
      var stateLabel = document.getElementById("stateLabel");
      var scoreLabel = document.getElementById("scoreLabel");
      var bestLabel = document.getElementById("bestLabel");
      var startBtn = document.getElementById("startBtn");
      var pauseBtn = document.getElementById("pauseBtn");
      var restartBtn = document.getElementById("restartBtn");

      var STATE = {
        READY: "ready",
        RUNNING: "running",
        PAUSED: "paused",
        OVER: "over"
      };

      var game = {
        state: STATE.READY,
        snake: [],
        direction: { x: 1, y: 0 },
        nextDirection: { x: 1, y: 0 },
        food: { x: 0, y: 0 },
        score: 0,
        best: Number(localStorage.getItem("snake_best_score") || 0),
        cellSize: 20,
        accumulator: 0,
        lastTime: 0
      };

      function resizeCanvas() {
        var cssSize = Math.min(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);
        var dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
        canvas.width = Math.floor(cssSize * dpr);
        canvas.height = Math.floor(cssSize * dpr);
        game.cellSize = canvas.width / GRID_SIZE;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        draw();
      }

      function setState(nextState) {
        game.state = nextState;
        var textMap = {
          ready: "未开始",
          running: "进行中",
          paused: "已暂停",
          over: "已结束"
        };
        stateLabel.textContent = textMap[nextState] || "未知";

        if (nextState === STATE.RUNNING) {
          overlay.classList.add("hidden");
          pauseBtn.textContent = "暂停";
        } else {
          overlay.classList.remove("hidden");
        }

        if (nextState === STATE.READY) {
          overlayTitle.textContent = "贪吃蛇";
          overlayText.textContent = "按“开始”按钮，或按空格键开始游戏。";
        } else if (nextState === STATE.PAUSED) {
          overlayTitle.textContent = "游戏暂停";
          overlayText.textContent = "按空格键或点击“暂停/继续”按钮继续。";
          pauseBtn.textContent = "继续";
        } else if (nextState === STATE.OVER) {
          overlayTitle.textContent = "游戏结束";
          overlayText.textContent = "按 Enter 或点击“重开”再来一局。";
        }
      }

      function resetGame(toReady) {
        var center = Math.floor(GRID_SIZE / 2);
        game.snake = [
          { x: center - 1, y: center },
          { x: center - 2, y: center },
          { x: center - 3, y: center }
        ];
        game.direction = { x: 1, y: 0 };
        game.nextDirection = { x: 1, y: 0 };
        game.score = 0;
        game.accumulator = 0;
        game.lastTime = performance.now();
        updateScore();
        placeFood();
        setState(toReady ? STATE.READY : STATE.RUNNING);
        draw();
      }

      function updateScore() {
        scoreLabel.textContent = String(game.score);
        if (game.score > game.best) {
          game.best = game.score;
          localStorage.setItem("snake_best_score", String(game.best));
        }
        bestLabel.textContent = String(game.best);
      }

      function randomInt(max) {
        return Math.floor(Math.random() * max);
      }

      function placeFood() {
        var occupied = {};
        for (var i = 0; i < game.snake.length; i++) {
          occupied[game.snake[i].x + "," + game.snake[i].y] = true;
        }

        var freeCells = [];
        for (var y = 0; y < GRID_SIZE; y++) {
          for (var x = 0; x < GRID_SIZE; x++) {
            if (!occupied[x + "," + y]) {
              freeCells.push({ x: x, y: y });
            }
          }
        }

        if (freeCells.length === 0) {
          game.score += 10;
          updateScore();
          setState(STATE.OVER);
          overlayTitle.textContent = "你赢了";
          overlayText.textContent = "棋盘已填满，按 Enter 或“重开”再玩一局。";
          return;
        }

        game.food = freeCells[randomInt(freeCells.length)];
      }

      function canTurn(nextDir) {
        return !(nextDir.x === -game.direction.x && nextDir.y === -game.direction.y);
      }

      function handleDirectionInput(x, y) {
        var dir = { x: x, y: y };
        if (!canTurn(dir)) {
          return;
        }
        game.nextDirection = dir;
        if (game.state === STATE.READY) {
          setState(STATE.RUNNING);
        }
      }

      function tick() {
        game.direction = game.nextDirection;

        var head = game.snake[0];
        var nextHead = {
          x: head.x + game.direction.x,
          y: head.y + game.direction.y
        };

        var hitWall =
          nextHead.x < 0 ||
          nextHead.y < 0 ||
          nextHead.x >= GRID_SIZE ||
          nextHead.y >= GRID_SIZE;
        if (hitWall) {
          setState(STATE.OVER);
          return;
        }

        for (var i = 0; i < game.snake.length; i++) {
          if (game.snake[i].x === nextHead.x && game.snake[i].y === nextHead.y) {
            setState(STATE.OVER);
            return;
          }
        }

        game.snake.unshift(nextHead);
        var ateFood = nextHead.x === game.food.x && nextHead.y === game.food.y;
        if (ateFood) {
          game.score += 1;
          updateScore();
          placeFood();
        } else {
          game.snake.pop();
        }
      }

      function drawGrid() {
        var cssSize = canvas.clientWidth;
        var step = cssSize / GRID_SIZE;
        ctx.clearRect(0, 0, cssSize, cssSize);
        ctx.fillStyle = "#111827";
        ctx.fillRect(0, 0, cssSize, cssSize);

        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for (var i = 1; i < GRID_SIZE; i++) {
          var p = Math.round(i * step) + 0.5;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, cssSize);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(cssSize, p);
          ctx.stroke();
        }
      }

      function drawFood() {
        var cssSize = canvas.clientWidth;
        var step = cssSize / GRID_SIZE;
        var x = game.food.x * step;
        var y = game.food.y * step;
        var radius = step * 0.38;
        ctx.fillStyle = "rgba(255, 107, 107, 0.25)";
        ctx.beginPath();
        ctx.arc(x + step / 2, y + step / 2, radius * 1.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ff6b6b";
        ctx.beginPath();
        ctx.arc(x + step / 2, y + step / 2, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawSnake() {
        var cssSize = canvas.clientWidth;
        var step = cssSize / GRID_SIZE;
        for (var i = game.snake.length - 1; i >= 0; i--) {
          var part = game.snake[i];
          var px = part.x * step;
          var py = part.y * step;
          var inset = step * 0.08;
          ctx.fillStyle = i === 0 ? "#27ae60" : "#58d68d";
          ctx.fillRect(px + inset, py + inset, step - inset * 2, step - inset * 2);
        }
      }

      function draw() {
        drawGrid();
        drawFood();
        drawSnake();
      }

      function gameLoop(ts) {
        if (game.state === STATE.RUNNING) {
          var delta = Math.min(100, ts - game.lastTime);
          game.lastTime = ts;
          game.accumulator += delta;
          var speed = BASE_SPEED + Math.floor(game.score / 4) * SPEED_GROWTH;
          var stepMs = 1000 / speed;

          while (game.accumulator >= stepMs && game.state === STATE.RUNNING) {
            tick();
            game.accumulator -= stepMs;
          }
          draw();
        } else {
          game.lastTime = ts;
        }
        window.requestAnimationFrame(gameLoop);
      }

      function togglePause() {
        if (game.state === STATE.RUNNING) {
          setState(STATE.PAUSED);
        } else if (game.state === STATE.PAUSED) {
          setState(STATE.RUNNING);
        } else if (game.state === STATE.READY) {
          setState(STATE.RUNNING);
        }
      }

      function restart() {
        resetGame(false);
      }

      function onKeyDown(e) {
        var key = e.key.toLowerCase();
        if (key === "arrowup" || key === "w") {
          e.preventDefault();
          handleDirectionInput(0, -1);
        } else if (key === "arrowdown" || key === "s") {
          e.preventDefault();
          handleDirectionInput(0, 1);
        } else if (key === "arrowleft" || key === "a") {
          e.preventDefault();
          handleDirectionInput(-1, 0);
        } else if (key === "arrowright" || key === "d") {
          e.preventDefault();
          handleDirectionInput(1, 0);
        } else if (key === " ") {
          e.preventDefault();
          togglePause();
        } else if (key === "enter") {
          e.preventDefault();
          restart();
        }
      }

      startBtn.addEventListener("click", function () {
        if (game.state === STATE.READY || game.state === STATE.OVER) {
          resetGame(false);
        } else if (game.state === STATE.PAUSED) {
          setState(STATE.RUNNING);
        }
      });

      pauseBtn.addEventListener("click", function () {
        togglePause();
      });

      restartBtn.addEventListener("click", function () {
        restart();
      });

      window.addEventListener("keydown", onKeyDown, { passive: false });
      window.addEventListener("resize", resizeCanvas);

      bestLabel.textContent = String(game.best);
      resetGame(true);
      resizeCanvas();
      window.requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
